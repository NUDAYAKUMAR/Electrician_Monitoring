<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile — ElecPro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        nav { background: #1a1a2e; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav .logo { color: #e94560; font-size: 1.3rem; font-weight: bold; text-decoration: none; }
        nav a { color: #ccc; text-decoration: none; margin-left: 16px; font-size: .9rem; }
        .content { max-width: 600px; margin: 50px auto; padding: 0 20px; }
        .card { background: #fff; padding: 34px 32px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
        .avatar { width: 80px; height: 80px; background: #e94560; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #fff; font-weight: bold; margin: 0 auto 16px; }
        h2 { text-align: center; margin-bottom: 4px; color: #1a1a2e; }
        .role-badge { text-align: center; margin-bottom: 24px; }
        .role-badge span { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: .85rem; font-weight: bold; background: #e94560; color: #fff; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .info-row:last-child { border-bottom: none; }
        .info-row .label { font-weight: bold; color: #888; font-size: .9rem; }
        .info-row .value { color: #333; font-size: .9rem; }
        .btn { display: block; margin: 24px auto 0; padding: 11px 28px; background: #e94560; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; text-align: center; text-decoration: none; width: 140px; }
        .btn:hover { background: #c73652; }
    </style>
</head>
<body>
<nav>
    <a class="logo" href="/dashboard">⚡ ElecPro</a>
    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/profile">Profile</a>
        <a href="/logout" style="color:#e94560;">Logout</a>
    </div>
</nav>

<div class="content">
    <div class="card">
        <!-- Avatar: first letter of name -->
        <div class="avatar">{{ user['name'][0].upper() }}</div>
        <h2>{{ user['name'] }}</h2>
        <div class="role-badge">
            <span>{{ user['role'].title() }}</span>
        </div>

        <div class="info-row">
            <span class="label">Name</span>
            <span class="value">{{ user['name'] }}</span>
        </div>
        <div class="info-row">
            <span class="label">Email</span>
            <span class="value">{{ user['email'] }}</span>
        </div>
        <div class="info-row">
            <span class="label">Role</span>
            <span class="value">{{ user['role'].title() }}</span>
        </div>
        <div class="info-row">
            <span class="label">User ID</span>
            <span class="value">#{{ user['id'] }}</span>
        </div>

        <a href="/logout" class="btn">Logout</a>
    </div>
</div>
</body>
</html>
